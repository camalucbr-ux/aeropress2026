<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPress 2026 Registration</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #d4a373; width: 320px; }
        h2 { color: #d4a373; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d4a373; border: none; color: black; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b88b5d; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>AeroPress 2026</h2>
        <form id="regForm">
            <input type="text" name="name" placeholder="Твое Имя" required>
            <input type="text" name="phone" placeholder="Телефон" required>
            <input type="text" name="tg_nick" placeholder="Ник в Telegram (без @)" required>
            <input type="number" name="tickets" placeholder="Количество билетов" min="1" required>
            <button type="submit" id="submitBtn">Зарегистрироваться</button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvcnRcGXIu-VGtakctk4PLEtKhXczvsjeF46dQT-uoF2IL8R1IjfmOMkvuzwPQZ5ABsA/exec";

        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Отправка...";
            btn.disabled = true;

            const formData = new FormData(this);
            const params = new URLSearchParams(formData).toString();

            fetch(SCRIPT_URL + "?" + params)
                .then(() => {
                    alert("✅ Готово! Теперь перейди в нашего бота и нажми СТАРТ.");
                    window.location.href = "https://t.me/ucb_aeropress_bot"; 
                })
                .catch(() => alert("Ошибка! Попробуй еще раз."));
        };
    </script>
</body>
</html>
