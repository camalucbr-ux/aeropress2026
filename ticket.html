<!DOCTYPE html>
<html>
<head>
    <title>Твой Билет</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .ticket {
            width: 600px; height: 300px;
            background: url('img/ticket.png') no-repeat center;
            background-size: contain;
            position: relative;
            font-family: Arial, sans-serif;
            color: white;
        }
        #userName { position: absolute; top: 130px; left: 40px; font-size: 24px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="ticket">
        <div id="userName">Загрузка...</div>
    </div>

    <script>
        // Скрипт берет номер строки из ссылки и спрашивает имя у таблицы
        const urlParams = new URLSearchParams(window.location.search);
        const row = urlParams.get('row');
        const SCRIPT_URL = "ТВОЙ_URL_СКРИПТА"; // Тот же, что и в index.html

        fetch(SCRIPT_URL + "?row=" + row)
            .then(res => res.json())
            .then(data => {
                document.getElementById('userName').innerText = data.name;
            });
    </script>
</body>
</html>
